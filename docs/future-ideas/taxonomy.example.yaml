  # === フォールバック ===
  - id: unclassified
    label: "未分類"
    aliases: []
    description: "上記いずれにも該当しない場合のみ。new_category_proposed に候補を入れる"


# 抽象化・センシティブ判定ルール（system prompt に注入）
prompt_rules:
  abstraction: |
    社内限定ホスティングに反映するため、個社名・案件名・担当者名を原則そのまま保持してよい。
    ただし、以下のいずれかに該当する場合は sensitive_flag: true を立てる:
      - 個人の人事評価・処遇・健康・宗教・思想に関する記述
      - 未公表の M&A、財務状況、訴訟、捜査関連
      - 第三者（顧客の顧客、提携先）の機密
      - 公開すれば顧客との信頼を損なう可能性のある率直なフィードバック

  voice_summary: |
    1エントリの voice_summary は 200〜250 字。
    「誰が・どんな状況で・何に困っていて/何が良かったか」を構造化して書く。
    冗長な前置きは省く。

  insight: |
    insight は任意。書く場合は WHERE プロダクト/営業/全社にとっての示唆を1〜2文で。
    存在しなければ null。
